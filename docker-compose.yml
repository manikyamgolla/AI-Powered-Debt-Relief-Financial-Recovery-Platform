version: "3.9"

services:
  backend:
    build: ./backend
    container_name: debt-relief-backend
    env_file:
      - .env
    ports:
      - "8000:8000"
    volumes:
      - backend_data:/app/data
    restart: unless-stopped

  frontend:
    build: ./frontend
    container_name: debt-relief-frontend
    ports:
      - "5173:80"
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  backend_data:
